services:
  # 1. Backend Web Service (FastAPI)
  - type: web
    name: majormatch-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/train_model.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FRONTEND_URL
        value: https://majormatch.onrender.com # Change this to your actual frontend URL later

  # 2. Frontend Static Site (React/Vite)
  - type: web
    name: majormatch-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://majormatch-backend.onrender.com # Change this to your actual backend URL later